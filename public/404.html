<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Excellence - Empowering Young Voices</title>
    <script>
      // GitHub Pages SPA fix — redirect all 404s back to the app
      // Encodes the path as a query param so index.html can restore it
      var segmentCount = 0;
      var location = window.location;
      var path = location.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~');
      location.replace(
        location.protocol + '//' + location.hostname + (location.port ? ':' + location.port : '') +
        location.pathname.slice(0, location.pathname.lastIndexOf('/') + 1).split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        (path ? path + (location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '') : '') +
        (location.hash ? location.hash : '')
      );
    </script>
  </head>
  <body></body>
</html>
